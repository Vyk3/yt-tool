name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app and .dmg
        run: bash scripts/build/macos/build_app.sh --clean

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: yt-tool-macOS
          path: dist/yt-tool-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: pwsh scripts/build/windows/build_exe.ps1 -Clean -Name yt-tool

      - name: Zip dist folder
        run: Compress-Archive -Path dist\yt-tool -DestinationPath dist\yt-tool-Windows.zip

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: yt-tool-Windows
          path: dist/yt-tool-Windows.zip

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: yt-tool-macOS
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: yt-tool-Windows
          path: dist/

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" dist/yt-tool-macOS.dmg dist/yt-tool-Windows.zip --clobber
