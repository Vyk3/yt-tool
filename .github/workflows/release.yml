name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      with_ffmpeg:
        description: 'Bundle ffmpeg/ffprobe into artifacts'
        required: false
        default: true
        type: boolean

env:
  # Formal releases bundle ffmpeg by default:
  # - push(tag): always true
  # - workflow_dispatch: default true, can be overridden to false manually
  WITH_FFMPEG: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.with_ffmpeg != 'false') && 'true' || 'false' }}
  # Pinned ffmpeg source + checksum (configure as repository variables).
  FFMPEG_MACOS_URL: ${{ vars.YT_TOOL_FFMPEG_MACOS_URL }}
  FFMPEG_MACOS_SHA256: ${{ vars.YT_TOOL_FFMPEG_MACOS_SHA256 }}
  FFPROBE_MACOS_URL: ${{ vars.YT_TOOL_FFPROBE_MACOS_URL }}
  FFPROBE_MACOS_SHA256: ${{ vars.YT_TOOL_FFPROBE_MACOS_SHA256 }}
  FFMPEG_WINDOWS_URL: ${{ vars.YT_TOOL_FFMPEG_WINDOWS_URL }}
  FFMPEG_WINDOWS_SHA256: ${{ vars.YT_TOOL_FFMPEG_WINDOWS_SHA256 }}

jobs:
  dispatch-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Explain dispatch mode
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "workflow_dispatch with_ffmpeg=$WITH_FFMPEG ref=$GITHUB_REF"
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::notice::This run is build-only (non-tag ref). publish job will be skipped."
          fi

      - name: Validate pinned ffmpeg lock
        if: env.WITH_FFMPEG == 'true'
        run: |
          missing=0
          for key in FFMPEG_MACOS_URL FFMPEG_MACOS_SHA256 FFPROBE_MACOS_URL FFPROBE_MACOS_SHA256 FFMPEG_WINDOWS_URL FFMPEG_WINDOWS_SHA256; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required repository variable: $key"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi
          for url_key in FFMPEG_MACOS_URL FFPROBE_MACOS_URL FFMPEG_WINDOWS_URL; do
            url="${!url_key}"
            if [[ "$url" == *"/latest/"* ]]; then
              echo "::error::Mutable URL is not allowed for $url_key: $url"
              exit 1
            fi
          done
          echo "Pinned ffmpeg source/sha variables are configured."

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt pyinstaller

      - name: Build .app and .dmg
        run: |
          if [[ "$WITH_FFMPEG" == "true" ]]; then
            bash scripts/build/macos/build_app.sh \
              --clean \
              --with-ffmpeg \
              --ffmpeg-url "$FFMPEG_MACOS_URL" \
              --ffmpeg-sha256 "$FFMPEG_MACOS_SHA256" \
              --ffprobe-url "$FFPROBE_MACOS_URL" \
              --ffprobe-sha256 "$FFPROBE_MACOS_SHA256"
          else
            bash scripts/build/macos/build_app.sh --clean
          fi

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: yt-tool-macOS
          path: dist/yt-tool-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: |
          $buildArgs = @("-Clean", "-Name", "yt-tool")
          if ("$env:WITH_FFMPEG" -eq "true") {
            $buildArgs += @(
              "-WithFfmpeg",
              "-FfmpegUrl", "$env:FFMPEG_WINDOWS_URL",
              "-FfmpegSha256", "$env:FFMPEG_WINDOWS_SHA256"
            )
          }
          & ./scripts/build/windows/build_exe.ps1 @buildArgs

      - name: Zip dist folder
        run: Compress-Archive -Path dist\yt-tool -DestinationPath dist\yt-tool-Windows.zip

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: yt-tool-Windows
          path: dist/yt-tool-Windows.zip

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: yt-tool-macOS
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: yt-tool-Windows
          path: dist/

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Release $TAG"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" dist/yt-tool-macOS.dmg dist/yt-tool-Windows.zip --clobber
