name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      with_ffmpeg:
        description: 'Bundle ffmpeg/ffprobe into artifacts'
        required: false
        default: false
        type: boolean

env:
  # Only workflow_dispatch can opt into ffmpeg bundling; push(tag) always stays lightweight.
  WITH_FFMPEG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.with_ffmpeg == 'true' && 'true' || 'false' }}

jobs:
  dispatch-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Explain dispatch mode
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "workflow_dispatch with_ffmpeg=$WITH_FFMPEG ref=$GITHUB_REF"
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::notice::This run is build-only (non-tag ref). publish job will be skipped."
          elif [[ "$WITH_FFMPEG" == "true" ]]; then
            echo "::notice::with_ffmpeg=true is build-only for now. publish job will be skipped until checksum policy is in place."
          fi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app and .dmg
        run: |
          ARGS="--clean"
          if [[ "$WITH_FFMPEG" == "true" ]]; then
            ARGS="$ARGS --with-ffmpeg"
          fi
          bash scripts/build/macos/build_app.sh $ARGS

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: yt-tool-macOS
          path: dist/yt-tool-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: |
          $buildArgs = @("-Clean", "-Name", "yt-tool")
          if ("$env:WITH_FFMPEG" -eq "true") {
            $buildArgs += "-WithFfmpeg"
          }
          & ./scripts/build/windows/build_exe.ps1 @buildArgs

      - name: Zip dist folder
        run: Compress-Archive -Path dist\yt-tool -DestinationPath dist\yt-tool-Windows.zip

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: yt-tool-Windows
          path: dist/yt-tool-Windows.zip

  publish:
    if: startsWith(github.ref, 'refs/tags/v') && !(github.event_name == 'workflow_dispatch' && github.event.inputs.with_ffmpeg == 'true')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: yt-tool-macOS
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: yt-tool-Windows
          path: dist/

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" dist/yt-tool-macOS.dmg dist/yt-tool-Windows.zip --clobber
