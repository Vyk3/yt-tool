name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest-linux:
    name: pytest (${{ matrix.python-version }}, linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp>=2025.1.0 pytest

      - name: Run tests
        run: python -m pytest tests/ -q

  pytest-macos:
    name: pytest (${{ matrix.python-version }}, macos)
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp>=2025.1.0 pytest

      - name: Run tests
        run: python -m pytest tests/ -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/ tests/

  launcher-windows-smoke:
    name: launcher smoke (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          py -3 -m pip install --upgrade pip
          py -3 -m pip install -r requirements.txt

      - name: Smoke yt.cmd
        shell: cmd
        run: |
          set YT_TOOL_MODE=cli
          set YT_TOOL_NO_PAUSE=1
          echo.| call launcher\windows\yt.cmd
          if not "%ERRORLEVEL%"=="1" (
            echo Unexpected exit code from yt.cmd: %ERRORLEVEL%
            exit /b 1
          )

      - name: Smoke yt.ps1
        shell: pwsh
        run: |
          $env:YT_TOOL_MODE = 'cli'
          $env:YT_TOOL_NO_PAUSE = '1'
          '' | & .\launcher\windows\yt.ps1
          if ($LASTEXITCODE -ne 1) {
            throw "Unexpected exit code from yt.ps1: $LASTEXITCODE"
          }
